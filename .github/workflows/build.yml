name: Build

on:
  push:
    tags: ['v*']

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npx electron-builder --win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Rename installer
        run: Get-ChildItem "release\*.exe" | Rename-Item -NewName "Conchitour-Setup.exe"
        shell: powershell
      - uses: softprops/action-gh-release@v2
        with:
          files: release/Conchitour-Setup.exe
          token: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npx electron-builder --mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Rename DMG
        run: mv release/*.dmg release/Conchitour.dmg
      - uses: softprops/action-gh-release@v2
        with:
          files: release/Conchitour.dmg
          token: ${{ secrets.GITHUB_TOKEN }}
